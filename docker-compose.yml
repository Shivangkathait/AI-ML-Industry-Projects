services:
  fastapi:
    build: .
    container_name: smartcart_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  streamlit:
    build: .
    container_name: smartcart_ui
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
    depends_on:
      - fastapi
    environment:
      - PYTHONUNBUFFERED=1